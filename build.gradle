plugins {
    id "java"
    id "maven-publish"
}

group = "com.nazarii.exchange"
version = "0.5.4"

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
    withSourcesJar()
    withJavadocJar()
}

repositories {
    mavenCentral()
}

dependencies {
    // === CORE LIBS ===
    implementation "com.lmax:disruptor:3.4.4"                 // RingBuffer, EventTranslatorOneArg
    compileOnly "org.projectlombok:lombok:1.18.30"            // Lombok annotations
    annotationProcessor "org.projectlombok:lombok:1.18.30"

    implementation "net.jpountz.lz4:lz4:1.3.0"                // net.jpountz.lz4.LZ4Compressor

    implementation "net.openhft:chronicle-core:2.27ea7"
    implementation "net.openhft:chronicle-bytes:2.27ea7"
    implementation "net.openhft:chronicle-wire:2.27ea7"

    implementation "org.eclipse.collections:eclipse-collections:10.4.0"
    implementation "org.agrona:agrona:1.13.0"

    implementation "ch.qos.logback:logback-classic:1.3.15"

    testImplementation "junit:junit:4.13.2"
}

tasks.withType(JavaCompile).configureEach {
    options.release = 8
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            artifactId = "exchange-core"
            pom {
                name = "exchange-core (dashdevs fork)"
                description = "Dashdevs fork of exchange-core"
            }
        }
    }
    repositories {
        maven {
            name = "GitHubPackages"
            url = uri("https://maven.pkg.github.com/dashdevs/exchange-core")
            credentials {
                username = System.getenv("GITHUB_ACTOR") ?: project.findProperty("gpr.user")
                password = System.getenv("GITHUB_TOKEN") ?: project.findProperty("gpr.key")
            }
        }
    }
}
